<!DOCTYPE html>
<html>
<head>
    <title>Firebase Test</title>
</head>
<body>
    <h1>Firebase Connection Test</h1>
    <div id="status">Testing...</div>
    <div id="error" style="color: red;"></div>
    
    <script type="module">
        // Import Firebase
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js';
        import { getAuth, signInAnonymously } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js';
        
        // Paste web app config from Firebase Console (do not commit real keys to git)
        const firebaseConfig = {
            apiKey: "YOUR_WEB_API_KEY",
            authDomain: "YOUR_PROJECT.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID",
            measurementId: "G-XXXXXXXXXX"
        };
        
        try {
            const app = initializeApp(firebaseConfig);
            const auth = getAuth(app);
            
            document.getElementById('status').innerHTML = '✅ Firebase initialized successfully!';
            
            // Test anonymous sign in
            signInAnonymously(auth).then(() => {
                document.getElementById('status').innerHTML += '<br>✅ Anonymous authentication works!';
            }).catch((error) => {
                document.getElementById('error').innerHTML = 'Auth error: ' + error.message;
            });
            
        } catch (error) {
            document.getElementById('error').innerHTML = 'Firebase error: ' + error.message;
            document.getElementById('status').innerHTML = '❌ Firebase failed to initialize';
        }
    </script>
</body>
</html>
